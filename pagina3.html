<body class="bg-light">
    <main>
        <div class="container-fluid mt-3">
            <div class="row">
                <div class="col-md-10 border p-4">
                    <div class="row">
                        <div class="col-md-6">
                            <h3 class="fw-bold">Ingresos</h3>
                            <div class="card p-3 shadow-sm">
                                <div class="mb-3">
                                    <label class="form-label">Salario</label>
                                    <input type="number" id="salario" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Bonificación</label>
                                    <input type="number" id="bonificacion" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Comisiones</label>
                                    <input type="number" id="comisiones" class="form-control">
                                </div>
                                <div class="mt-4 p-3 bg-light border fw-bold">
                                    Total ganado: <span id="totalGanado">0.00</span>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <h3 class="fw-bold">Egresos</h3>
                            <div class="card p-3 shadow-sm">
                                <div class="mb-3">
                                    <label class="form-label">Ahorro</label>
                                    <input type="number" id="ahorro" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">IGSS</label>
                                    <input type="number" id="igss" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Préstamos / Otros</label>
                                    <input type="number" id="prestamos" class="form-control">
                                </div>
                                <div class="mt-4 p-3 bg-light border fw-bold">
                                    Total descuentos: <span id="totalDescuentos">0.00</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-12 text-center">
                            <button class="btn btn-primary w-100 py-2 fw-bold" id="btnCalcular">
                                Obtener sueldo líquido
                            </button>
                            <div class="mt-3 p-4 border display-6 fw-bold" id="resultadoFinal">
                                Q 0.00
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-2 border text-center p-2">
                    <img src="https://pbs.twimg.com/profile_images/1924486286737285120/Hlec0UD__400x400.jpg"
                        alt="Logo Intecap" class="img-fluid border shadow-sm">
                </div>
            </div>
        </div>
    </main>
