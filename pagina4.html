<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Cálculo de Indemnización</h4>
                    </div>
                    <div class="card-body">
                        <form id="indemnizacionForm">
                            <div class="mb-3">
                                <label for="sueldoBase" class="form-label">Sueldo Base (Q)</label>
                                <input type="number" class="form-control" id="sueldoBase" step="0.01" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="aniosTrabajados" class="form-label">Años Trabajados</label>
                                    <input type="number" class="form-control" id="aniosTrabajados" min="0" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="mesesTrabajados" class="form-label">Meses Trabajados
                                        (Proporcional)</label>
                                    <input type="number" class="form-control" id="mesesTrabajados" min="0" max="11"
                                        required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="salarioPendiente" class="form-label">Salario Pendiente (Q)</label>
                                    <input type="number" class="form-control" id="salarioPendiente" step="0.01"
                                        value="0">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="deudas" class="form-label">Deudas o Cobros Pendientes (Q)</label>
                                    <input type="number" class="form-control" id="deudas" step="0.01" value="0">
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="button" class="btn btn-primary" id="btnCalcular">Calcular
                                    Indemnización</button>
                            </div>
                        </form>

                        <div id="resultado" class="mt-4 d-none">
                            <h5>Resultados del Cálculo:</h5>
                            <ul class="list-group">
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    Indemnización por años:
                                    <span id="resAnios" class="badge bg-secondary rounded-pill">0.00</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    Bono 14 proporcional:
                                    <span id="resBono14" class="badge bg-secondary rounded-pill">0.00</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    Aguinaldo proporcional:
                                    <span id="resAguinaldo" class="badge bg-secondary rounded-pill">0.00</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    Salario Pendiente:
                                    <span id="resSalarioPendiente" class="badge bg-secondary rounded-pill">0.00</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    Deudas:
                                    <span id="resDeudas" class="badge bg-danger rounded-pill">0.00</span>
                                </li>
                                <li
                                    class="list-group-item d-flex justify-content-between align-items-center bg-light fw-bold">
                                    Total a Recibir:
                                    <span id="resTotal" class="badge bg-success rounded-pill fs-6">0.00</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
